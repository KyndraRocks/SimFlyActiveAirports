name: Fetch SimFly Payout Data

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  fetch-payout:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and compile payout data
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs    = require('fs');

          function post(page) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ icao: '', country: '', category: '', page });
              const req  = https.request({
                hostname: 'simfly.io',
                path:     '/api/airports/rewards',
                method:   'POST',
                headers:  { 'Content-Type': 'text/plain;charset=UTF-8',
                            'Content-Length': Buffer.byteLength(body) }
              }, res => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve(JSON.parse(data)); }
                  catch(e) { reject(new Error('Parse error on page ' + page + ': ' + data.slice(0, 200))); }
                });
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function main() {
            const first      = await post(1);
            const totalPages = first.totalPages || 1;
            console.log(`Fetching ${totalPages} page(s) — ${first.totalItems} airports total`);

            const pages = [first];
            for (let p = 2; p <= totalPages; p++) {
              pages.push(await post(p));
              if (p % 5 === 0 || p === totalPages) console.log(`  Page ${p}/${totalPages}`);
            }

            const db = {};
            for (const page of pages) {
              for (const ap of page.list || []) {
                db[ap.icao] = {
                  // Existing keys — DO NOT rename; downstream apps and Gist sync read these.
                  p: ap.percToUser,
                  o: (ap.owner && ap.owner.username) ? ap.owner.username : null,
                  c: ap.category != null ? ap.category : null,
                  // Level / progression
                  lvl:   ap.level != null ? ap.level : null,
                  // level_progress is a long float (e.g. 11.0619…) and changes continuously;
                  // round to 1 dp to keep the file small and cut hourly commit churn.
                  lprog: ap.level_progress != null ? Math.round(ap.level_progress * 10) / 10 : null,
                  xp:    ap.xp != null ? ap.xp : null,
                  exp:   ap.earnedXp != null ? ap.earnedXp : null,
                  txp:   ap.totalEarnedXp != null ? ap.totalEarnedXp : null,
                  // Rotation / capacity — mrot - rot = rotations remaining this week
                  rot:   ap.rotation != null ? ap.rotation : null,
                  mrot:  ap.maxRotation != null ? ap.maxRotation : null,
                  // Traffic
                  pax:   ap.pax != null ? ap.pax : null,
                  epax:  ap.earnedPax != null ? ap.earnedPax : null,
                  // Metadata
                  act:   ap.activation_date != null ? ap.activation_date : null,
                  mkt:   ap.availableForMarketplace != null ? ap.availableForMarketplace : null,
                  on:    ap.active != null ? ap.active : null,
                  n:     (ap.owner && ap.owner.nonce != null) ? ap.owner.nonce : null
                };
              }
            }

            // airport-registry.json is an append-only map of { ICAO: "YYYY-MM-DD" } that
            // persists first_seen across gaps in payout data (e.g. owner sets sharing to 0%).
            // Once an ICAO is recorded here it is never removed, so a returning airport always
            // gets its original first_seen rather than being falsely treated as brand new.
            let registry = {};
            try { registry = JSON.parse(fs.readFileSync('airport-registry.json', 'utf8')); } catch(e) {}

            let existing = {};
            try { existing = JSON.parse(fs.readFileSync('payout-data.json', 'utf8')); } catch(e) {}

            // One-time migration: seed the registry from any first_seen values already present
            // in the on-disk snapshot (airports tracked before the registry existed).
            let registryDirty = false;
            for (const [icao, info] of Object.entries(existing)) {
              if (info.first_seen && !registry[icao]) {
                registry[icao] = info.first_seen;
                registryDirty = true;
              }
            }

            const today = new Date().toISOString().slice(0, 10);
            for (const icao of Object.keys(db)) {
              if (registry[icao]) {
                // Known airport (currently active or returning after a gap) — use historical date.
                db[icao].first_seen = registry[icao];
              } else if (!existing[icao]) {
                // Not in registry AND absent from last snapshot → genuinely brand new.
                db[icao].first_seen = today;
                registry[icao] = today;
                registryDirty = true;
              }
              // In existing but not in registry = pre-feature airport; no first_seen, no ring.
            }

            fs.writeFileSync('payout-data.json', JSON.stringify(db));
            console.log(`Wrote ${Object.keys(db).length} airports to payout-data.json`);

            if (registryDirty) {
              fs.writeFileSync('airport-registry.json', JSON.stringify(registry));
              console.log(`Registry updated — ${Object.keys(registry).length} airports tracked`);
            }
          }

          main().catch(e => { console.error('FAILED:', e.message); process.exit(1); });
          SCRIPT

      - name: Commit if changed
        run: |
          git add payout-data.json airport-registry.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: payout data $(date -u '+%Y-%m-%d %H:%M UTC')"
            # Retry-with-rebase: a manual push (e.g. RT/AA delivery) may land
            # between checkout and push. payout-data.json is regenerated fresh
            # each run (with first_seen preserved from the registry),
            # so rebasing our one commit on top is always safe.
            for i in 1 2 3; do
              if git push; then exit 0; fi
              echo "Push rejected (attempt $i) — pulling with rebase and retrying."
              git pull --rebase origin main
            done
            echo "Push still failing after 3 attempts." >&2
            exit 1
          fi

      - name: Update owner and category Gists
        env:
          GIST_PAT: ${{ secrets.GIST_PAT }}
        run: |
          node << 'SCRIPT'
          const https = require('https');
          const fs    = require('fs');

          const OWNER_GIST_ID    = '9cae932383ce289378fff9de8a23f631';
          const OWNER_FILENAME   = 'SimFlyActivePlayerOwnedAirports.txt';
          const CAT_GIST_ID      = 'ea789dd01cf6148900290a9c3af3ca5a';
          const CAT_FILENAME     = 'SimFly_Airport_Categories.csv';

          function rawGet(url) {
            return new Promise((resolve, reject) => {
              https.get(url, { headers: { 'User-Agent': 'SimFly-RT-Sync/1.0' } }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(d));
              }).on('error', reject);
            });
          }

          function patchGist(gistId, filename, content, token) {
            return new Promise((resolve, reject) => {
              const body = JSON.stringify({ files: { [filename]: { content } } });
              const req  = https.request({
                hostname: 'api.github.com',
                path:     `/gists/${gistId}`,
                method:   'PATCH',
                headers:  {
                  'Authorization':        `Bearer ${token}`,
                  'User-Agent':           'SimFly-RT-Sync/1.0',
                  'Accept':               'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type':         'application/json',
                  'Content-Length':       Buffer.byteLength(body)
                }
              }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve(res.statusCode));
              });
              req.on('error', reject);
              req.write(body);
              req.end();
            });
          }

          async function updateOwnerGist(payout, token) {
            const txt = await rawGet(
              `https://gist.githubusercontent.com/KyndraRocks/${OWNER_GIST_ID}/raw/${OWNER_FILENAME}?t=${Date.now()}`
            );

            // Parse existing owner file: "Name: ICAO1 ICAO2 ..."
            const owners = new Map();
            for (const rawLine of txt.split('\n')) {
              const line  = rawLine.trim();
              const colon = line.indexOf(':');
              if (colon < 0) continue;
              const name = line.slice(0, colon).trim();
              if (!name) continue;
              const key = name.toLowerCase();
              if (!owners.has(key)) owners.set(key, { name, icaos: new Set() });
              line.slice(colon + 1).trim().split(/\s+/).filter(Boolean)
                  .forEach(ic => owners.get(key).icaos.add(ic.toUpperCase()));
            }

            let added = 0, transferred = 0;
            for (const [icao, info] of Object.entries(payout)) {
              const owner = info.o;
              if (!owner) continue;
              const upperIcao  = icao.toUpperCase();
              const targetKey  = owner.toLowerCase();

              // Remove from any prior different owner
              let hadPrior = false;
              for (const [key, entry] of owners) {
                if (key === targetKey) continue;
                if (entry.icaos.has(upperIcao)) {
                  entry.icaos.delete(upperIcao);
                  if (entry.icaos.size === 0) owners.delete(key);
                  hadPrior = true;
                  transferred++;
                }
              }

              let tgt = owners.get(targetKey);
              const alreadyOwned = !!(tgt && tgt.icaos.has(upperIcao));
              if (!tgt) { tgt = { name: owner, icaos: new Set() }; owners.set(targetKey, tgt); }
              tgt.icaos.add(upperIcao);
              if (!hadPrior && !alreadyOwned) added++;
            }

            if (!added && !transferred) {
              console.log('Owner Gist: no changes');
              return;
            }

            const content = [...owners.values()]
              .filter(o => o.icaos.size)
              .sort((a, b) => a.name.localeCompare(b.name, undefined, { sensitivity: 'base' }))
              .map(o => `${o.name}: ${[...o.icaos].sort().join(' ')}`)
              .join('\n');

            const status = await patchGist(OWNER_GIST_ID, OWNER_FILENAME, content, token);
            if (status === 200) {
              console.log(`Owner Gist updated — ${added} added, ${transferred} transferred`);
            } else {
              console.error(`Owner Gist PATCH failed: HTTP ${status}`);
              process.exit(1);
            }
          }

          async function updateCategoryGist(payout, token) {
            const txt   = await rawGet(
              `https://gist.githubusercontent.com/KyndraRocks/${CAT_GIST_ID}/raw/${CAT_FILENAME}?t=${Date.now()}`
            );
            const lines = txt.split('\n').filter(l => l.trim());
            if (!lines.length) throw new Error('Category CSV is empty');

            const header = lines[0];
            const cols   = header.split(',').map(c => c.trim().toUpperCase());
            const iIcao  = cols.indexOf('ICAO');
            const iCat   = cols.indexOf('CAT');
            if (iIcao < 0 || iCat < 0) throw new Error('Category CSV missing ICAO/CAT columns');

            // Parse existing rows — preserve extra columns verbatim
            const rows = new Map();
            for (let i = 1; i < lines.length; i++) {
              const parts = lines[i].split(',');
              const icao  = (parts[iIcao] || '').trim().toUpperCase();
              if (icao) rows.set(icao, parts);
            }

            let added = 0, changed = 0;
            for (const [icao, info] of Object.entries(payout)) {
              if (info.c == null) continue;
              const catStr   = String(info.c).trim();
              const upperIcao = icao.toUpperCase();
              if (rows.has(upperIcao)) {
                const parts = rows.get(upperIcao).slice();
                while (parts.length <= iCat) parts.push('');
                if ((parts[iCat] || '').trim() !== catStr) {
                  parts[iCat] = catStr;
                  rows.set(upperIcao, parts);
                  changed++;
                }
              } else {
                const parts = new Array(cols.length).fill('');
                parts[iIcao] = upperIcao;
                parts[iCat]  = catStr;
                rows.set(upperIcao, parts);
                added++;
              }
            }

            if (!added && !changed) {
              console.log('Category Gist: no changes');
              return;
            }

            const content = header + '\n' + [...rows.entries()]
              .sort((a, b) => a[0].localeCompare(b[0]))
              .map(([, parts]) => parts.join(','))
              .join('\n');

            const status = await patchGist(CAT_GIST_ID, CAT_FILENAME, content, token);
            if (status === 200) {
              console.log(`Category Gist updated — ${added} added, ${changed} changed`);
            } else {
              console.error(`Category Gist PATCH failed: HTTP ${status}`);
              process.exit(1);
            }
          }

          async function main() {
            const token = process.env.GIST_PAT;
            if (!token) { console.error('GIST_PAT secret not set'); process.exit(1); }

            const payout = JSON.parse(fs.readFileSync('payout-data.json', 'utf8'));
            await updateOwnerGist(payout, token);
            await updateCategoryGist(payout, token);
          }

          main().catch(e => { console.error('FAILED:', e.message); process.exit(1); });
          SCRIPT
